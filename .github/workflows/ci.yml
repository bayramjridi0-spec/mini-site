name: CI Pipeline

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    name: Test HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verifier index.html existe
        run: |
          if [ ! -f html/index.html ]; then
            echo "ERREUR: html/index.html manquant!"
            exit 1
          fi
          echo "index.html trouve ✅"

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t mini-site:latest .
